        // ローカル予備データを一括で規格化
        function normalizeLocalBooks() {

        // 入力文字列から「数字」と「上/下」をダイレクト検出し、「N巻」または「N巻上/下」に完全統一
        function formatVolumeName(str) {
            if (!str) return "1巻";
            let trimmed = str.trim();
            const toHalfWidth = (s) => s.replace(/[０-９]/g, (m) => String.fromCharCode(m.charCodeAt(0) - 0xFEE0));

            const numMatch = trimmed.match(/[0-9０-９]+/);
            if (!numMatch) {
                let sub = "";
                if (trimmed.includes("上")) sub = "上";
                if (trimmed.includes("下")) sub = "下";
                return sub ? `1巻${sub}` : trimmed;
            }

            const num = parseInt(toHalfWidth(numMatch[0]), 10);
            
            let sub = "";
            if (trimmed.includes("上")) {
                sub = "上";
            } else if (trimmed.includes("下")) {
                sub = "下";
            }

            return `${num}巻${sub}`;
        }

        // タイトルに潜む固有表現の抽出、および親シリーズ名への分離
        function parseVolumeAndSeriesTitle(rawTitle) {
            let seriesTitle = rawTitle.trim();
            let volumeName = "";

            const toHalfWidth = (s) => s.replace(/[０-９]/g, (m) => String.fromCharCode(m.charCodeAt(0) - 0xFEE0));

            // 1. "不可解" パターン
            const patternFukakai = /(.*?)\s*不可解\s*([0-9０-９]+)/i;
            const matchFukakai = seriesTitle.match(patternFukakai);
            if (matchFukakai) {
                seriesTitle = matchFukakai[1].trim();
                const num = parseInt(toHalfWidth(matchFukakai[2]), 10);
                let sub = "";
                if (rawTitle.includes("上")) sub = "上";
                if (rawTitle.includes("下")) sub = "下";
                volumeName = `${num}巻${sub}`;
                return { seriesTitle, volumeName };
            }

            // 2. "Flag" パターン
            const patternFlag = /(.*?)\s*Flag\s*([0-9０-９]+)/i;
            const matchFlag = seriesTitle.match(patternFlag);
            if (matchFlag) {
                seriesTitle = matchFlag[1].trim();
                const num = parseInt(toHalfWidth(matchFlag[2]), 10);
                let sub = "";
                if (rawTitle.includes("上")) sub = "上";
                if (rawTitle.includes("下")) sub = "下";
                volumeName = `${num}巻${sub}`;
                if (seriesTitle.endsWith('.')) {
                    seriesTitle = seriesTitle.slice(0, -1).trim();
                }
                return { seriesTitle, volumeName };
            }

            // 3. "理学部ノート" パターン
            const patternRigakubu = /(.*?)\s*[-－]?\s*(?:デルタとガンマの)?理学部ノート\s*([0-9０-９]+)/i;
            const matchRigakubu = seriesTitle.match(patternRigakubu);
            if (matchRigakubu) {
                seriesTitle = matchRigakubu[1].trim();
                const num = parseInt(toHalfWidth(matchRigakubu[2]), 10);
                let sub = "";
                if (rawTitle.includes("上")) sub = "上";
                if (rawTitle.includes("下")) sub = "下";
                volumeName = `${num}巻${sub}`;
                if (seriesTitle.includes("よって、初恋は証明された。")) {
                    seriesTitle = "よって、初恋は証明された。";
                }
                return { seriesTitle, volumeName };
            }

            // 4. "Vol." パターン
            const patternVol = /(.*?)\s*Vol\.\s*([0-9０-９]+)/i;
            const matchVol = seriesTitle.match(patternVol);
            if (matchVol) {
                seriesTitle = matchVol[1].trim();
                const num = parseInt(toHalfWidth(matchVol[2]), 10);
                let sub = "";
                if (rawTitle.includes("上")) sub = "上";
                if (rawTitle.includes("下")) sub = "下";
                volumeName = `${num}巻${sub}`;
                return { seriesTitle, volumeName };
            }

            // 5. "巻" パターン
            const patternKan = /(.*?)\s*([0-9０-９]+)\s*巻/i;
            const matchKan = seriesTitle.match(patternKan);
            if (matchKan) {
                seriesTitle = matchKan[1].trim();
                const num = parseInt(toHalfWidth(matchKan[2]), 10);
                let sub = "";
                if (rawTitle.includes("上")) sub = "上";
                if (rawTitle.includes("下")) sub = "下";
                volumeName = `${num}巻${sub}`;
                return { seriesTitle, volumeName };
            }

            // 6. 単なる数字付きパターン
            const patternSimple = /(.*?)\s*([0-9０-９]+)\s*(?:[〈(（]?([上下])[〉)）]?)?$/;
            const matchSimple = seriesTitle.match(patternSimple);
            if (matchSimple) {
                seriesTitle = matchSimple[1].trim();
                const num = parseInt(toHalfWidth(matchSimple[2]), 10);
                let sub = "";
                if (rawTitle.includes("上")) sub = "上";
                if (rawTitle.includes("下")) sub = "下";
                volumeName = `${num}巻${sub}`;
                return { seriesTitle, volumeName };
            }

            return { seriesTitle, volumeName: "" };
        }

        // 上下巻ソート比較
        function sortBookVolumes(bookObj) {
            bookObj.volumes.sort((a, b) => {
                const numA = parseInt((a.volumeName.match(/\d+/) || [0])[0], 10);
                const numB = parseInt((b.volumeName.match(/\d+/) || [0])[0], 10);
                if (numA !== numB) {
                    return numA - numB;
                }
                const isAUp = a.volumeName.includes('上');
                const isBUp = b.volumeName.includes('上');
                const isADown = a.volumeName.includes('下');
                const isBDown = b.volumeName.includes('下');
                
                if (isAUp && !isBUp) return -1;
                if (!isAUp && isBUp) return 1;
                if (isADown && !isBDown) return 1;
                if (!isADown && isBDown) return -1;
                return 0;
            });
        }

        // CSVパース
        function parseCSVToMatrix(csvText) {
            const result = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        row[row.length - 1] += '"';
                        i++; 
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push('');
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i++; 
                    result.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += char;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                result.push(row);
            }
            return result;
        }

        function fixCoverImageUrl(url) {
            if (!url) return "";
            let trimmed = url.trim();

            if (trimmed.includes("github.com") && trimmed.includes("/blob/")) {
                return trimmed.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            }

            if (trimmed.includes("drive.google.com") && trimmed.includes("/file/d/")) {
                const match = trimmed.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
            }
            return trimmed;
        }

        // ================= スプレッドシート同期処理 =================
        async function fetchSpreadsheetData() {
            if (!SPREADSHEET_CSV_URL || SPREADSHEET_CSV_URL.trim() === "") {
                return;
            }

            try {
                const response = await fetch(SPREADSHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP Error! Status: ${response.status}`);
                const csvText = await response.text();
                
                const rawMatrix = parseCSVToMatrix(csvText);
                if (rawMatrix.length < 2) {
                    throw new Error("スプレッドシートデータが不十分です。");
                }

                const headerDefinitions = {
                    id: ["id", "ID", "作品ID", "作品id", "番号"],
                    title: ["title", "作品名", "タイトル", "書名"],
                    author: ["author", "著者", "作者", "ライター"],
                    illustrator: ["illustrator", "イラスト", "イラストレーター", "絵", "絵師"],
                    label: ["label", "レーベル", "文庫"],
                    genres: ["genres", "メインジャンル", "ジャンル", "大分類"],
                    subgenres: ["subgenres", "サブジャンル", "特徴", "属性", "要素"],
                    illustFeatures: ["illustFeatures", "イラスト特徴", "イラストの特徴", "キャラ属性", "ビジュアル"],
                    gradient: ["gradient", "グラデーション", "背景グラデーション", "色", "背景色"],
                    symbol: ["symbol", "アイコン", "シンボル", "マーク"],
                    releaseDate: ["releaseDate", "発売日", "刊行日"],
                    price: ["price", "価格", "値段", "定価"],
                    coverImage: ["coverImage", "表紙画像", "画像URL", "画像リンク", "カバー画像", "画像"],
                    summary: ["summary", "あらすじ", "詳細", "概要", "ストーリー"],
                    volumeName: ["volumeName", "巻数名", "巻数", "巻名", "巻表記"]
                };

                const rawHeaders = rawMatrix[0].map(h => h.trim());
                const headerIndices = {};

                Object.keys(headerDefinitions).forEach(key => {
                    const synonyms = headerDefinitions[key];
                    const idx = rawHeaders.findIndex(header => synonyms.includes(header));
                    if (idx !== -1) {
                        headerIndices[key] = idx;
                    }
                });

                if (!headerIndices.id && !headerIndices.title) {
                    throw new Error("必須ヘッダーが検出できませんでした。");
                }

                const dataRows = rawMatrix.slice(1);
                const tempBooksMap = new Map();

                dataRows.forEach((row) => {
                    const titleVal = headerIndices.title !== undefined ? row[headerIndices.title] : null;
                    const idVal = headerIndices.id !== undefined ? row[headerIndices.id] : null;
                    if (!titleVal && !idVal) return;

                    const bookId = idVal ? parseInt(idVal.trim(), 10) : (tempBooksMap.size + 1);
                    if (isNaN(bookId)) return;

                    const rawTitle = titleVal ? titleVal.trim() : "タイトル未設定";
                    const parsed = parseVolumeAndSeriesTitle(rawTitle);
                    const seriesTitle = parsed.seriesTitle;

                    let volumeName = (headerIndices.volumeName !== undefined && row[headerIndices.volumeName]) ? row[headerIndices.volumeName].trim() : parsed.volumeName;
                    volumeName = formatVolumeName(volumeName);

                    const author = (headerIndices.author !== undefined && row[headerIndices.author]) ? row[headerIndices.author].trim() : "著者不明";
                    const illustrator = (headerIndices.illustrator !== undefined && row[headerIndices.illustrator]) ? row[headerIndices.illustrator].trim() : "イラストレーター不明";
                    const label = (headerIndices.label !== undefined && row[headerIndices.label]) ? row[headerIndices.label].trim() : "電撃文庫";
                    const genres = (headerIndices.genres !== undefined && row[headerIndices.genres]) ? row[headerIndices.genres].split(/[,，、]/).map(s => s.trim().toLowerCase()).filter(Boolean) : ["romcom"];
                    const subgenres = (headerIndices.subgenres !== undefined && row[headerIndices.subgenres]) ? row[headerIndices.subgenres].split(/[,，、]/).map(s => s.trim()).filter(Boolean) : [];
                    const illustFeatures = (headerIndices.illustFeatures !== undefined && row[headerIndices.illustFeatures]) ? row[headerIndices.illustFeatures].split(/[,，、]/).map(s => s.trim()).filter(Boolean) : [];
                    const gradient = (headerIndices.gradient !== undefined && row[headerIndices.gradient]) ? row[headerIndices.gradient].trim() : "from-indigo-600 via-purple-600 to-pink-600";
                    const symbol = (headerIndices.symbol !== undefined && row[headerIndices.symbol]) ? row[headerIndices.symbol].trim() : "book-open";

                    const releaseDate = (headerIndices.releaseDate !== undefined && row[headerIndices.releaseDate]) ? row[headerIndices.releaseDate].trim() : "発売日未定";
                    const price = (headerIndices.price !== undefined && row[headerIndices.price]) ? row[headerIndices.price].trim() : "価格未定";
                    const rawCoverImage = (headerIndices.coverImage !== undefined && row[headerIndices.coverImage]) ? row[headerIndices.coverImage].trim() : "";
                    const coverImage = fixCoverImageUrl(rawCoverImage);
                    const summary = (headerIndices.summary !== undefined && row[headerIndices.summary]) ? row[headerIndices.summary].trim() : "あらすじ情報がありません。";

                    if (!tempBooksMap.has(bookId)) {
                        tempBooksMap.set(bookId, {
                            id: bookId,
                            title: seriesTitle, 
                            author: author,
                            illustrator: illustrator,
                            label: label,
                            genres: genres,
                            subgenres: subgenres,
                            illustFeatures: illustFeatures,
                            gradient: gradient,
                            symbol: symbol,
                            volumes: []
                        });
                    }

                    const bookObj = tempBooksMap.get(bookId);
                    
                    let finalVolumeName = volumeName ? volumeName.trim() : "";
                    if (finalVolumeName === "") {
                        const nextIndex = bookObj.volumes.length + 1;
                        finalVolumeName = nextIndex + "巻";
                    }

                    const isVolDuplicate = bookObj.volumes.some(v => v.volumeName === finalVolumeName);
                    if (isVolDuplicate) {
                        const nextIndex = bookObj.volumes.length + 1;
                        finalVolumeName = `${nextIndex}巻`;
                    }

                    bookObj.volumes.push({
                        volumeName: finalVolumeName, 
                        releaseDate: releaseDate,
                        price: price,
                        coverImage: coverImage,
                        summary: summary
                    });
                });

                tempBooksMap.forEach(bookObj => {
                    sortBookVolumes(bookObj);
                });

                const parsedBooks = Array.from(tempBooksMap.values());
                if (parsedBooks.length > 0) {
                    books = parsedBooks;
                    showToast("📡 最新の書籍情報を連動取得しました！");
                    if (document.getElementById('results').classList.contains('hidden') === false) {
                        showResults();
                    }
                }

            } catch (error) {
                console.warn("Spreadsheet connection skipped or failed, using local database.", error);
            }
        }

            }

            return `
                <div class="${sizeClasses} shrink-0 bg-gradient-to-br ${book.gradient} text-white flex flex-col justify-between p-2.5 rounded-xl shadow-md relative overflow-hidden group-hover:scale-105 transition-transform duration-300">
                    <div class="absolute -right-6 -bottom-6 w-16 h-16 rounded-full bg-white/10 blur-sm"></div>
                    <div class="absolute -left-6 -top-6 w-20 h-20 rounded-full bg-white/5 blur-md"></div>
                    <span class="bg-white/20 backdrop-blur-md px-1.5 py-0.5 rounded text-[7px] tracking-wide font-black uppercase text-center self-start">${book.label}</span>
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-20">
                        <i data-lucide="${book.symbol}" class="w-12 h-12"></i>
                    </div>
                    <div class="z-10 mt-1">
                        <p class="text-[8.5px] font-black leading-tight line-clamp-3 text-white/95 accent-font drop-shadow-sm">${book.title}</p>
                    </div>
                    <div class="z-10">
                        <p class="text-[6.5px] text-white/70 line-clamp-1 font-bold">著者: ${book.author}</p>
                        <p class="text-[6.5px] text-white/70 line-clamp-1 font-bold">絵: ${book.illustrator}</p>
                    </div>
                </div>
            `;
        }

        function renderSubgenreOptions() {
            const container = document.getElementById('subgenre-options');
            if (!container) return;
            container.innerHTML = '';

            const filteredBooks = books.filter(book => book.genres.includes(selectedGenre));
            const subgenreSet = new Set();
            filteredBooks.forEach(book => {
                book.subgenres.forEach(sub => subgenreSet.add(sub));
            });

            const options = Array.from(subgenreSet);

            if (options.length === 0) {
                container.className = "flex flex-col items-center justify-center py-8 text-center col-span-2 space-y-3";
                container.innerHTML = `
                    <div class="p-3 bg-indigo-50 text-indigo-500 rounded-full">
                        <i data-lucide="info" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-700">このジャンルの作品は現在準備中です</p>
                        <p class="text-xs text-slate-400 mt-1">そのまま「次に進む」を押してください。</p>
                    </div>
                `;
                if (typeof lucide !== 'undefined') lucide.createIcons();
                return;
            }

            container.className = "grid grid-cols-2 gap-3";

            options.forEach(tag => {
                const isSelected = selectedSubgenres.includes(tag);
                const button = document.createElement('button');
                button.setAttribute('data-tag', tag);
                button.onclick = () => toggleSubgenre(tag, button);
                
                if (isSelected) {
                    button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm";
                } else {
                    button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-white border-slate-200 text-slate-600 hover:bg-slate-50";
                }
                
                let iconName = 'hash';
                if (tag === 'SF') iconName = 'cpu';
                if (tag === '青春') iconName = 'sparkles';
                if (tag === '学園') iconName = 'graduation-cap';
                if (tag === '異能') iconName = 'zap';
                if (tag === '前世') iconName = 'history';
                if (tag === '三角関係') iconName = 'triangle';
                if (tag === '同棲' || tag === '同居' || tag === '同居系') iconName = 'home';
                if (tag === 'じれ甘') iconName = 'heart';
                if (tag === '美少女') iconName = 'star';
                if (tag === '友達関係') iconName = 'smile';
                if (tag === '距離感バグ') iconName = 'shrink';
                if (tag === '年齢逆転') iconName = 'timer-reset';
                if (tag === '教師×生徒') iconName = 'book-open';
                if (tag === '科学') iconName = 'flask';
                if (tag === '部活') iconName = 'trophy';
                if (tag === '日常の謎') iconName = 'help-circle';
                if (tag === '恋愛') iconName = 'heart';
                if (tag === '魔術') iconName = 'wand';
                if (tag === '探偵') iconName = 'search';
                if (tag === '英国') iconName = 'map-pin';
                if (tag === 'ダーク') iconName = 'moon';
                if (tag === 'ファンタジー') iconName = 'sparkles';
                if (tag === 'エルフ') iconName = 'flower-2';
                if (tag === '男女友情') iconName = 'users';
                if (tag === '両片想い') iconName = 'heart-pulse';
                if (tag === '義妹') iconName = 'baby';
                if (tag === '家族') iconName = 'users';
                if (tag === 'ハーレム') iconName = 'heart-handshake';

                button.innerHTML = `
                    <i data-lucide="${iconName}" class="w-3.5 h-3.5"></i>
                    <span>${tag}</span>
                `;
                container.appendChild(button);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.toggleSubgenre = function(tag, button) {
            const index = selectedSubgenres.indexOf(tag);
            if (index > -1) {
                selectedSubgenres.splice(index, 1);
                button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-white border-slate-200 text-slate-600 hover:bg-slate-50";
            } else {
                selectedSubgenres.push(tag);
                button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm";
            }
        };

        function renderIllustOptions() {
            const container = document.getElementById('illust-options');
            if (!container) return;
            container.innerHTML = '';

            const options = ["美少女", "クール", "美麗", "かわいい", "エモい", "賑やか", "ワイルド", "コミカル", "シリアス"];

            options.forEach(tag => {
                const isSelected = selectedIllustFeatures.includes(tag);
                const button = document.createElement('button');
                button.onclick = () => toggleIllustFeature(tag, button);
                
                if (isSelected) {
                    button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-pink-50 border-pink-500 text-pink-700 shadow-sm";
                } else {
                    button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-white border-slate-200 text-slate-600 hover:bg-slate-50";
                }

                let iconName = 'hash';
                if (tag === '美少女') iconName = 'star';
                if (tag === 'クール') iconName = 'wind';
                if (tag === '美麗') iconName = 'sparkles';
                if (tag === 'かわいい') iconName = 'heart';
                if (tag === 'エモい') iconName = 'sun';
                if (tag === '賑やか') iconName = 'party-popper';
                if (tag === 'シリアス') iconName = 'eye-off';
                if (tag === 'コミカル') iconName = 'laugh';
                if (tag === 'ワイルド') iconName = 'zap';

                button.innerHTML = `
                    <i data-lucide="${iconName}" class="w-3.5 h-3.5"></i>
                    <span>${tag}</span>
                `;
                container.appendChild(button);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.toggleIllustFeature = function(tag, button) {
            const index = selectedIllustFeatures.indexOf(tag);
            if (index > -1) {
                selectedIllustFeatures.splice(index, 1);
                button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-white border-slate-200 text-slate-600 hover:bg-slate-50";
            } else {
                selectedIllustFeatures.push(tag);
                button.className = "p-3 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex items-center justify-center space-x-1.5 bg-pink-50 border-pink-500 text-pink-700 shadow-sm";
            }
        };

        // ================= 診断結果算出・表示 =================
        window.showResults = function() {
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');

            const resultsContainer = document.getElementById('results-container');
            if (!resultsContainer) return;
            resultsContainer.innerHTML = '';

            const finalBooks = books.filter(book => {
                const isGenreMatch = book.genres.includes(selectedGenre);
                const isSubgenreMatch = selectedSubgenres.length === 0 || 
                    selectedSubgenres.some(tag => book.subgenres.includes(tag));
                const illustFeatures = book.illustFeatures || [];
                const isIllustMatch = selectedIllustFeatures.length === 0 || 
                    selectedIllustFeatures.some(tag => illustFeatures.includes(tag));

                return isGenreMatch && isSubgenreMatch && isIllustMatch;
            });

            if (finalBooks.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-12 px-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                        <div class="p-3 bg-amber-50 text-amber-500 rounded-full inline-block">
                            <i data-lucide="frown" class="w-8 h-8"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">マッチする作品が見つかりませんでした</h3>
                        <p class="text-xs text-slate-400 leading-relaxed">
                            条件を変えて、もう一度お試しください。
                        </p>
                    </div>
                `;
                if (typeof lucide !== 'undefined') lucide.createIcons();
                return;
            }

            let scoredBooks = finalBooks.map(book => {
                let score = 0;
                if (book.genres.includes(selectedGenre)) score += 15;
                const matchedSub = book.subgenres.filter(tag => selectedSubgenres.includes(tag)).length;
                score += matchedSub * 4;
                const illustFeatures = book.illustFeatures || [];
                const matchedIllust = illustFeatures.filter(tag => selectedIllustFeatures.includes(tag)).length;
                score += matchedIllust * 3;
                return { book, score };
            });

            scoredBooks.sort((a, b) => b.score - a.score);

            scoredBooks.forEach(({ book, score }) => {
                const card = createBookCard(book, score);
                resultsContainer.appendChild(card);
            });

            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        function createBookCard(book, score) {
            const card = document.createElement('div');
            card.onclick = () => openModal(book);
            card.className = "flex bg-white p-4 rounded-2xl border border-slate-100 hover:shadow-xl hover:-translate-y-0.5 transition-all cursor-pointer relative group";

            const volCount = book.volumes.length;
            const volLabel = volCount > 1 ? `（全${volCount}巻収録）` : `（単巻収録）`;

            const baseVol = book.volumes[0] || { summary: 'あらすじ情報読込中...' };
            const tagsHTML = book.subgenres.map(sub => `
                <span class="bg-slate-50 text-slate-500 text-[10px] px-2 py-0.5 rounded-md font-bold">#${sub}</span>
            `).join('');

            card.innerHTML = `
                <div class="relative flex w-full space-x-3.5">
                    ${generateBookCoverHTML(book, false, 0)}
                    <div class="flex-1 flex flex-col justify-between py-1 min-w-0 pr-6">
                        <div class="space-y-1">
                            <h3 class="font-black text-xs text-slate-800 leading-snug line-clamp-2 pr-12 group-hover:text-indigo-600 transition-colors">${book.title} <span class="text-[10px] text-indigo-500 font-bold">${volLabel}</span></h3>
                            <p class="text-[10px] text-slate-400">著者: <span class="font-bold text-slate-600">${book.author}</span> / 絵: <span class="font-bold text-slate-600">${book.illustrator}</span></p>
                        </div>
                        <p class="text-[10px] text-slate-500 line-clamp-2 mt-1 leading-normal bg-slate-50/50 p-1.5 rounded-lg">${baseVol.summary}</p>
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${tagsHTML}
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        window.restartDiagnostic = function() {
            selectedGenre = null;
            selectedSubgenres = [];
            selectedIllustFeatures = [];
            currentStep = 1;

            document.getElementById('results').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');

            document.querySelectorAll('.genre-card').forEach(card => {
                card.classList.remove('border-red-500', 'bg-red-50/20', 'border-indigo-500', 'bg-indigo-50/20', 'border-pink-500', 'bg-pink-50/20', 'border-slate-500', 'bg-slate-50/20');
                card.classList.add('border-slate-100', 'bg-white');
            });

            const nextBtn = document.getElementById('next-btn-1');
            if (nextBtn) {
                nextBtn.disabled = true;
                nextBtn.className = "w-full py-4 rounded-2xl text-white font-black text-base shadow-lg transition-all duration-300 flex items-center justify-center space-x-2 bg-slate-300 cursor-not-allowed";
            }
        };

        // ================= 詳細表示モーダル =================
        window.openModal = function(book) {
            currentModalBook = book;
            activeVolumeIndex = 0; 
            
            const modal = document.getElementById('detail-modal');
            if (!modal) return;
            
            document.getElementById('modal-title').textContent = book.title;
            document.getElementById('modal-author').textContent = book.author;
            document.getElementById('modal-illustrator').textContent = book.illustrator;
            
            const volTabsContainer = document.getElementById('modal-volume-tabs');
            if (volTabsContainer) {
                volTabsContainer.innerHTML = '';
                book.volumes.forEach((vol, index) => {
                    const btn = document.createElement('button');
                    btn.onclick = () => selectVolumeInModal(index);
                    btn.className = `px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${
                        index === 0 ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                    }`;
                    btn.textContent = vol.volumeName;
                    volTabsContainer.appendChild(btn);
                });
            }

            loadVolumeData(0);

            const tagsContainer = document.getElementById('modal-tags');
            if (tagsContainer) {
                tagsContainer.innerHTML = '';
                const allTags = [...book.subgenres, ...(book.illustFeatures || [])];
                allTags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = "bg-indigo-50 text-indigo-600 text-[10px] px-2.5 py-1 rounded-full font-bold";
                    span.textContent = `#${tag}`;
                    tagsContainer.appendChild(span);
                });
            }

            modal.classList.remove('hidden');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        window.selectVolumeInModal = function(index) {
            activeVolumeIndex = index;
            
            const volTabsContainer = document.getElementById('modal-volume-tabs');
            if (volTabsContainer) {
                const tabs = volTabsContainer.children;
                for (let i = 0; i < tabs.length; i++) {
                    if (i === index) {
                        tabs[i].className = "px-3 py-1.5 rounded-lg text-xs font-bold transition-all border bg-indigo-600 text-white border-indigo-600 shadow-sm";
                    } else {
                        tabs[i].className = "px-3 py-1.5 rounded-lg text-xs font-bold transition-all border bg-white text-slate-600 border-slate-200 hover:bg-slate-50";
                    }
                }
            }

            loadVolumeData(index);
        };

        function loadVolumeData(index) {
            if (!currentModalBook || !currentModalBook.volumes[index]) return;
            
            const vol = currentModalBook.volumes[index];
            document.getElementById('modal-date').textContent = vol.releaseDate;
            document.getElementById('modal-price').textContent = vol.price;
            document.getElementById('modal-summary').textContent = cleanText(vol.summary);
            document.getElementById('story-volume-label').textContent = `あらすじ (${vol.volumeName})`;

            const coverPlaceholder = document.getElementById('modal-cover-placeholder');
            if (coverPlaceholder) {
                coverPlaceholder.innerHTML = generateBookCoverHTML(currentModalBook, true, index);
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        }

        function cleanText(text) {
            if (!text) return "";
            return text.replace(/\\n/g, '\n').replace(/\r/g, '').trim();
        }

        window.closeModal = function() {
            const modal = document.getElementById('detail-modal');
            if (modal) modal.classList.add('hidden');
            currentModalBook = null;
        };

        window.buyBookLink = function() {
            if (!currentModalBook) return;
            const vol = currentModalBook.volumes[activeVolumeIndex] || currentModalBook.volumes[0];
            const encodedTitle = encodeURIComponent(currentModalBook.title + " " + vol.volumeName);
            const searchUrl = `https://dengekibunko.jp/product/search-list.html?key=${encodedTitle}`;
            window.open(searchUrl, '_blank');
        };

    </script>
</body>
</html>
